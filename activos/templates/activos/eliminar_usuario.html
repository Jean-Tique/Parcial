<h1>Eliminar Usuario</h1>
<p>¿Estás seguro de que quieres eliminar al usuario 
   <strong>{{ object.first_name }} {{ object.last_name }}</strong>?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit">Sí, eliminar</button>
  <a href="{% url 'activos:lista_usuarios' %}">Cancelar</a>
</form>
